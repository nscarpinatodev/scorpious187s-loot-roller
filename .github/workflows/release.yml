name: Release

# Publish a Foundry-ready release whenever a version tag (e.g. v1.2.0) is pushed.
#   git tag -a v1.2.0 -m "release notes go here"
#   git push origin v1.2.0
# The tag's annotation message becomes the release body.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      MODULE_ZIP: scorpious187s-loot-roller.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need the annotated tag object for release notes

      - name: Sync module.json version & URLs to the tag
        run: |
          node -e '
            const fs = require("fs");
            const tag  = process.env.GITHUB_REF_NAME;     // e.g. v1.2.0
            const repo = process.env.GITHUB_REPOSITORY;   // owner/name
            const zip  = process.env.MODULE_ZIP;
            const m = JSON.parse(fs.readFileSync("module.json", "utf8"));
            m.version  = tag.replace(/^v/, "");
            m.manifest = `https://github.com/${repo}/releases/latest/download/module.json`;
            m.download = `https://github.com/${repo}/releases/download/${tag}/${zip}`;
            fs.writeFileSync("module.json", JSON.stringify(m, null, 2) + "\n");
            console.log(`module.json -> version ${m.version}`);
          '

      - name: Build package (module files at zip root)
        run: |
          zip -r "$MODULE_ZIP" \
            module.json scripts styles templates lang data README.md LICENSE

      - name: Release notes from tag annotation
        run: |
          git tag -l --format='%(contents)' "$GITHUB_REF_NAME" > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $GITHUB_REF_NAME" > RELEASE_NOTES.md
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$MODULE_ZIP" module.json \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            --latest
